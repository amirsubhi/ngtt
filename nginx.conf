upstream backend {
  ip_hash;  # sticky sessions required for Socket.io multi-worker
  server 127.0.0.1:4000;
}

upstream frontend {
  server 127.0.0.1:3000;
}

server {
  listen 80;
  server_name ngtt.com www.ngtt.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name ngtt.com www.ngtt.com;

  ssl_certificate     /etc/letsencrypt/live/ngtt.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ngtt.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  client_max_body_size 100M;

  # Announce — no buffering; torrent clients need immediate response
  location /announce/ {
    proxy_pass             http://backend;
    proxy_http_version     1.1;
    proxy_set_header       Host $host;
    proxy_set_header       X-Real-IP $remote_addr;
    proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering        off;
    proxy_read_timeout     30s;
  }

  # Scrape — same passthrough rules as announce
  location /scrape {
    proxy_pass             http://backend;
    proxy_http_version     1.1;
    proxy_set_header       Host $host;
    proxy_set_header       X-Real-IP $remote_addr;
    proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering        off;
    proxy_read_timeout     30s;
  }

  # Passkey-authenticated torrent downloads
  location /dl/ {
    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_buffering    off;
  }

  # API
  location /api/ {
    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection 'upgrade';
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  # WebSocket (Socket.io)
  location /socket.io/ {
    proxy_pass             http://backend;
    proxy_http_version     1.1;
    proxy_set_header       Upgrade $http_upgrade;
    proxy_set_header       Connection 'upgrade';
    proxy_set_header       Host $host;
    proxy_set_header       X-Real-IP $remote_addr;
    proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cache_bypass     $http_upgrade;
    proxy_read_timeout     3600s;
  }

  # Static uploads — served by Nginx directly, never hits Node.js
  location /uploads/ {
    alias       /var/www/ngtt/uploads/;
    expires     30d;
    add_header  Cache-Control "public, immutable";
    add_header  X-Content-Type-Options nosniff;
  }

  # Next.js static assets — long cache
  location /_next/static/ {
    proxy_pass         http://frontend;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    expires            1y;
    add_header         Cache-Control "public, immutable";
  }

  # Next.js frontend
  location / {
    proxy_pass         http://frontend;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection 'upgrade';
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }
}
