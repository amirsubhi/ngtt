upstream backend {
  ip_hash;  # sticky sessions for Socket.io
  server 127.0.0.1:4000;
}

upstream frontend {
  server 127.0.0.1:3000;
}

server {
  listen 80;
  server_name ngtt.com www.ngtt.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name ngtt.com www.ngtt.com;

  ssl_certificate     /etc/letsencrypt/live/ngtt.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ngtt.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  client_max_body_size 100M;

  # API
  location /api/ {
    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection 'upgrade';
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  # WebSocket (Socket.io)
  location /socket.io/ {
    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection 'upgrade';
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_cache_bypass $http_upgrade;
  }

  # Static uploads
  location /uploads/ {
    alias /var/www/ngtt/uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Next.js frontend
  location / {
    proxy_pass         http://frontend;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection 'upgrade';
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }
}
